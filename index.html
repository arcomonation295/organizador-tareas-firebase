<!DOCTYPE html>
<html lang="es" data-theme="light">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productividad UTP</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <button id="historyBtn" class="btn-history">📜 Ver Historial</button>

<div id="historyModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <div class="modal-header">
            <h2>Historial de Tareas</h2>
            <button id="closeHistory" class="close-x">✕</button>
        </div>
        <div id="historyContent" class="history-list">
            </div>
    </div>
</div>

<div id="focusModal" class="modal-overlay" style="display: none;">
    <div class="focus-card">
        <div class="focus-header">
            <span class="pulse-icon">●</span> Modo Enfoque
        </div>
        <h2 id="focusTaskName">Nombre de la Tarea</h2>
        <div id="focusTimer" class="timer-huge">25:00</div>
        <div class="focus-controls">
            <button id="playFocus" class="btn-circle">▶</button>
            <button id="stopFocus" class="btn-circle">⏹</button>
        </div>
    </div>
</div>

    <div id="authScreen" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-icon">🎓</div>
            <h1>Bienvenido</h1>
            <p>Organiza tus tareas de la universidad y el trabajo.</p>
            <div class="auth-buttons">
                <button id="googleLoginBtn" class="btn-google">Entrar con Google</button>
                <button id="guestBtn" class="btn-guest">Modo Invitado</button>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container" style="display: none;">
        <header class="header-section">
            <div>
                <h1 id="userNameDisplay">Mi Día</h1>
                <p id="dateDisplay"></p>
                <button id="logoutBtn" class="logout-btn">Cerrar Sesión</button>
            </div>
            <div class="header-controls">
                <button id="themeToggle" class="theme-btn">🌙</button>
                <div class="progress-box">
                    <svg width="60" height="60">
                        <circle class="ring-bg" cx="30" cy="30" r="24" fill="transparent" stroke-width="5"/>
                        <circle id="progressCircle" class="ring-active" cx="30" cy="30" r="24" fill="transparent" stroke-width="5"/>
                    </svg>
                    <span id="progressText">0%</span>
                </div>
            </div>
        </header>

        <div class="input-section">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="¿Qué harás hoy?">
                <button id="addBtn" class="btn-add">+</button>
            </div>
            <div class="input-row">
                <select id="categoryInput">
                    <option value="Personal">Personal</option>
                    <option value="Universidad">Universidad</option>
                    <option value="Trabajo">Trabajo</option>
                </select>
                <select id="priorityInput">
                    <option value="baja">🟢 Baja</option>
                    <option value="media">🟡 Media</option>
                    <option value="alta">🔴 Alta</option>
                </select>
                <input type="date" id="dateInput">
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Hechas</button>
        </div>

        <ul id="taskList"></ul>
        <div id="emptyState" class="empty-state" style="display: none;">☕ ¡Todo listo por hoy!</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
