<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productividad UTP - Master</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div id="authScreen" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-icon">💻</div>
            <h1>Bienvenido</h1>
            <p>Gestiona tus pendientes de la UTP y el trabajo.</p>
            <div class="auth-buttons">
                <button id="googleLoginBtn" class="btn-google">Entrar con Google</button>
                <button id="guestBtn" class="btn-guest">Entrar como Invitado</button>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container" style="display: none;">
        <header class="header-section">
            <div class="header-main">
                <h1 id="userNameDisplay">Mi Día</h1>
                <p id="dateDisplay"></p>
                <div class="header-actions">
                    <button id="logoutBtn" class="link-btn">Cerrar Sesión</button>
                    <button id="historyBtn" class="link-btn">📜 Ver Historial</button>
                </div>
            </div>
            <div class="header-stats">
                <button id="themeToggle" class="theme-btn">🌙</button>
                <div class="progress-widget">
                    <svg width="60" height="60">
                        <circle class="ring-bg" cx="30" cy="30" r="24" fill="transparent" stroke-width="5"/>
                        <circle id="progressCircle" class="ring-active" cx="30" cy="30" r="24" fill="transparent" stroke-width="5"/>
                    </svg>
                    <span id="progressText">0%</span>
                </div>
            </div>
        </header>

        <section class="input-card">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="¿Qué hay que hacer?">
                <button id="addBtn" class="btn-add">+</button>
            </div>
            <div class="input-row details">
                <select id="categoryInput">
                    <option value="Personal">Personal</option>
                    <option value="Universidad">Universidad</option>
                    <option value="Trabajo">Trabajo</option>
                </select>
                <select id="priorityInput">
                    <option value="baja">🟢 Baja</option>
                    <option value="media">🟡 Media</option>
                    <option value="alta">🔴 Alta</option>
                </select>
                <input type="date" id="dateInput">
            </div>
        </section>

        <nav class="filter-nav">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Hechas</button>
        </nav>

        <ul id="taskList" class="task-list"></ul>
        <div id="emptyState" class="empty-msg">☕ ¡Todo bajo control!</div>
    </div>

    <div id="historyModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Historial de Tareas</h2>
                <button id="closeHistory" class="close-btn">✕</button>
            </div>
            <div id="historyContent" class="history-container">
                </div>
        </div>
    </div>

    <div id="focusModal" class="modal-overlay" style="display: none;">
        <div class="focus-box">
            <div class="focus-label">● MODO ENFOQUE</div>
            <h2 id="focusTaskName">Tarea Actual</h2>
            <div id="focusTimer" class="timer-display">25:00</div>
            <div class="focus-btns">
                <button id="toggleFocusBtn" class="btn-primary">Iniciar</button>
                <button id="exitFocusBtn" class="btn-secondary">Salir</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
