<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productividad Personal | UTP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="authScreen" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-icon">🚀</div>
            <h1>Bienvenido, Ingeniero</h1>
            <p>Sincroniza tus tareas de la universidad y el trabajo en la nube.</p>
            <div class="auth-buttons">
                <button id="googleLoginBtn" class="btn-google">Entrar con Google</button>
                <button id="guestBtn" class="btn-guest">Probar como Invitado</button>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container" style="display: none;">
        <header class="header-section">
            <div class="header-text">
                <h1 id="userNameDisplay">Mi Día</h1>
                <p id="dateDisplay"></p>
                <button id="logoutBtn" class="logout-link">Cerrar Sesión</button>
            </div>
            
            <div class="header-widgets">
                <button id="themeToggle" class="theme-btn">🌙</button>
                <div class="progress-box">
                    <svg class="progress-ring" width="60" height="60">
                        <circle class="progress-ring__circle-bg" stroke-width="5" fill="transparent" r="24" cx="30" cy="30"/>
                        <circle id="progressCircle" class="progress-ring__circle" stroke-width="5" fill="transparent" r="24" cx="30" cy="30"/>
                    </svg>
                    <span id="progressText">0%</span>
                </div>
            </div>
        </header>
        
        <div class="input-card">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="¿Qué hay que hacer hoy?">
                <button id="addBtn" class="btn-add">+</button>
            </div>
            <div class="input-details">
                <select id="categoryInput">
                    <option value="Personal">Personal</option>
                    <option value="Universidad">Universidad</option>
                    <option value="Trabajo">Trabajo</option>
                </select>
                <select id="priorityInput">
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                </select>
                <input type="date" id="dateInput">
            </div>
        </div>

        <nav class="filter-bar">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Hechas</button>
        </nav>

        <ul id="taskList" class="task-list"></ul>
        
        <div id="emptyState" class="empty-state">
            <p>No hay tareas pendientes. ¡Relájate! ☕</p>
        </div>
    </div>

    <div id="pomodoroModal" class="modal-overlay" style="display: none;">
        <div class="pomodoro-card">
            <h2 id="pomodoroTaskName">Enfoque</h2>
            <div id="timerDisplay" class="timer">25:00</div>
            <div class="pomodoro-btns">
                <button id="startTimerBtn">Iniciar</button>
                <button id="closePomodoroBtn">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
