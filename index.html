<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productividad Personal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="authScreen" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-icon">☕</div>
            <h1>Bienvenido</h1>
            <p>Gestiona tus tareas de la UTP y el trabajo de forma inteligente.</p>
            <div class="auth-buttons">
                <button id="googleLoginBtn" class="btn-google">Entrar con Google</button>
                <button id="guestBtn" class="btn-guest">Modo Invitado</button>
            </div>
            <p class="auth-footer">El modo invitado no guarda datos en la nube.</p>
        </div>
    </div>

    <div id="appContainer" class="app-container" style="display: none;">
        <header class="header-section">
            <div class="header-text">
                <h1 id="userNameDisplay">Mi Día</h1>
                <p id="dateDisplay"></p>
                <button id="logoutBtn" class="logout-link">Cerrar Sesión</button>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="themeToggle" class="theme-btn">🌙</button>
                <div class="progress-container">
                    <svg class="progress-ring" width="60" height="60">
                        <circle class="progress-ring__circle-bg" stroke-width="6" fill="transparent" r="24" cx="30" cy="30"/>
                        <circle class="progress-ring__circle" stroke-width="6" fill="transparent" r="24" cx="30" cy="30"/>
                    </svg>
                    <span id="progressText">0%</span>
                </div>
            </div>
        </header>
        
        <section class="input-section">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="¿Qué pendientes tienes hoy?">
                <button class="btn-add" id="addBtn">+</button>
            </div>
            <div class="input-row">
                <select id="categoryInput">
                    <option value="Personal">Personal</option>
                    <option value="Universidad">Universidad</option>
                    <option value="Trabajo">Trabajo</option>
                </select>
                <select id="priorityInput">
                    <option value="baja">🟢 Baja</option>
                    <option value="media">🟡 Media</option>
                    <option value="alta">🔴 Alta</option>
                </select>
            </div>
            <input type="date" id="dateInput">
        </section>

        <nav class="filters">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Hechas</button>
        </nav>

        <ul id="taskList"></ul>
        
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">✨</div>
            <p>Todo al día. ¡Buen trabajo!</p>
        </div>
    </div>

    <div id="pomodoroModal" class="modal-overlay" style="display: none;">
        <div class="pomodoro-card">
            <button class="close-btn" id="closePomodoroBtn">✕</button>
            <p class="pomodoro-subtitle">MODO ENFOQUE</p>
            <h2 id="pomodoroTaskName">Tarea</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="pomodoro-controls">
                <button id="startTimerBtn" class="btn-primary">Iniciar</button>
                <button id="resetTimerBtn" class="btn-secondary">Reiniciar</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
